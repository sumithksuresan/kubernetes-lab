apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-html
data:
  index.html: |
    <!DOCTYPE html>
    <html>
    <head>
      <title>Sumith Fullstack </title>
    </head>
    <body>
      <h1>Frontend + Backend (Internal API)</h1>
      <button onclick="loadData()">Get Server Info</button>
      <pre id="output"></pre>

      <script>
        async function loadData() {
          const res = await fetch("/api/info");
          const data = await res.json();
          document.getElementById("output").innerText =
            "Node: " + data.node + "\nPod: " + data.pod;
        }
      </script>
    </body>
    </html>

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: node:18-alpine
        command: ["sh","-c"]
        args:
          - |
            cat <<EOF > server.js
            const http = require('http');
            const port = 3000;

            const server = http.createServer((req,res) => {
              if (req.url === '/info') {
                res.writeHead(200, {'Content-Type': 'application/json'});
                res.end(JSON.stringify({
                  node: process.env.NODE_NAME,
                  pod: process.env.HOSTNAME
                }));
              } else {
                res.writeHead(404);
                res.end();
              }
            });

            server.listen(port);
            EOF

            node server.js
        ports:
        - containerPort: 3000
        env:
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName

---
apiVersion: v1
kind: Service
metadata:
  name: backend
spec:
  type: ClusterIP   # 🔒 internal only
  selector:
    app: backend
  ports:
  - port: 3000
    targetPort: 3000

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-conf
data:
  default.conf: |
    server {
      listen 80;

      location / {
        root /usr/share/nginx/html;
        index index.html;
      }

      location /api/ {
        proxy_pass http://backend:3000/;
      }
    }    

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-fronentd
spec:
  replicas: 3
  selector:
    matchLabels:
      app: nginx-frontend
  template:
    metadata:
      labels:
        app: nginx-frontend
    spec:
      containers:
      - name: nginx
        image: nginx:latest
        ports:
        - containerPort: 80
        volumeMounts:
        - name: html
          mountPath: /usr/share/nginx/html
        - name: nginx-conf
          mountPath: /etc/nginx/conf.d            
      volumes:
      - name: html
        configMap:
          name: nginx-html
      - name: nginx-conf
        configMap:
          name: nginx-conf            

---
apiVersion: v1
kind: Service
metadata:
  name: nginx-service
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-scheme: internet-facing
spec:
  type: LoadBalancer   # for external website
  selector:
    app: nginx-frontend
  ports:
  - port: 80
    targetPort: 80
    nodePort: 30007   # optional, can remove to auto-assign
